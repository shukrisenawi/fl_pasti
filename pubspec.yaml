name: pasti
description: A fullscreen Flutter wrapper for Pasti Kawasan Sik.
publish_to: 'none'
version: 1.0.1+2

environment:
  sdk: '>=3.9.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  file_picker: ^11.0.2
  webview_flutter: ^4.13.1
  webview_flutter_android: ^4.11.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^1.0.4

flutter:
  uses-material-design: true
  assets:
    - assets/branding/logo-pasti.png
